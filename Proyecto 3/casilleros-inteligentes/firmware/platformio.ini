; Firmware ESP32-CAM (AI-Thinker). Dos entornos:
;   [env:esp32cam]        -> Controlador de Casilleros (MQTT). Fuente: main.cpp
;   [env:esp32cam_stream] -> Modo streaming de video MJPEG. Fuente: stream_main.cpp
;
; Flashear uno u otro:
;   pio run -e esp32cam -t upload
;   pio run -e esp32cam_stream -t upload
;
; La ESP32-CAM no tiene USB: se programa con adaptador FTDI (auto-reset en esta base).

[env]
platform = espressif32@6.5.0
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 460800
; Puerto del adaptador FTDI (FT232R) detectado en este Mac
upload_port = /dev/cu.usbserial-A5069RR4
monitor_port = /dev/cu.usbserial-A5069RR4
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM

[env:esp32cam]
build_src_filter = +<*> -<stream_main.cpp>
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.4

[env:esp32cam_stream]
build_src_filter = +<stream_main.cpp>
